# 全局项目配置文件示例
# 包含所有服务的配置，避免多个配置文件难以管理

# ============================================================================
# API Server 配置
# ============================================================================
[apiserver]
listen_address = "0.0.0.0:3000"
log_level = "info"
cors_enabled = true

# ============================================================================
# 远程 OCR 配置
# ============================================================================
[remote_ocr]
perm_url = "https://web.xxxx.com/api/perm/single"
start_url = "https://web.xxxx.com/api/ocr/image/beta"
status_url = "https://web.xxxx.com/api/ocr/image/beta/status"
auth_token = "your_auth_token_here"
auth_uuid = "your_auth_uuid_here"
auth_cookie = "your_auth_cookie_here"
origin = "https://web.xxxx.com"
mode = "single"
timeout_secs = 30
poll_interval_ms = 3000
poll_max_attempts = 10
poll_initial_delay_ms = 500
accept_invalid_certs = false

# ============================================================================
# Rsync 服务配置
# ============================================================================
[rsync.metadata]
id = "rsync-service"
name = "Rsync Service"
description = "Data synchronization service"

[rsync.global]
debug = false

[rsync.api]
listen_address = "0.0.0.0:8080"
log_level = "info"
metrics_enabled = true

[rsync.log]
path = "./log/"

# ============================================================================
# 七牛云对象存储配置
# ============================================================================
[object_storage]
access_key = "your_qiniu_access_key"
secret_key = "your_qiniu_secret_key"
bucket = "your-bucket-name"
region = "z0"
domain = "your-bucket-domain.example.com"
public_base_url = "https://your-bucket-domain.example.com"
upload_token_ttl_secs = 3600
private_url_ttl_secs = 3600
use_https = true
bucket_is_private = false

# ============================================================================
# DataLink Engine 配置
# ============================================================================
# 当前支持的 backend: memory
# mysql 配置面已预留，但后端实现暂未完成，选择 mysql 时会返回未支持错误。
[datalink_engine]
backend = "memory"

# 仅在未来启用 mysql backend 时使用。
[datalink_engine.mysql]
host = "127.0.0.1"
port = 3306
user = "root"
password = ""
database = "rsde"
max_connections = 10
min_connections = 1
connect_timeout_secs = 10

# ============================================================================
# NodeManage 节点管理配置
# ============================================================================
# 启用后 apiserver 会挂载 /api/nodes 路由。
# 当前模块提供节点 CRUD、心跳、rsagent 注册边界，以及在线安装 rsagent 的入口。
[nodemanage]
# 节点管理相关表名前缀，后续接入 MySQL 持久化时使用。
table_prefix = "node_"
# 在线添加节点时，nodemanage 通过 SSH 到目标机器安装的 rsagent 包地址。
# 也可以在 POST /api/nodes/install 请求体中覆盖该地址。
rsagent_package_url = "https://example.com/rsagent.tar.gz"
# rsagent 默认安装根目录。
install_root = "/opt/rsagent"
# 远端 rsagent 安装完成后回调注册的地址。
register_callback_url = "http://127.0.0.1:3000/api/nodes/agent/register"
# 等待 rsagent 完成注册的超时时间，单位秒。
register_wait_timeout_secs = 30
# SSH 连接超时时间，单位秒。
ssh_connect_timeout_secs = 10

[nodemanage.heartbeat]
result_table_name = "nm_node_heartbeat"
metric_name = "nm_node_heartbeat"
query_template = "query $metric_name where node_id = $node_id and agent_id = $agent_id and node_ip = $node_ip between $start_at and $end_at"
storage_cluster = "default"
interval_seconds = 60
retention_days = 7
refresh_interval_secs = 60
status_window_secs = 300

[[nodemanage.install_plugins]]
name = "metrics"
version = "1.0.0"
package_url = "https://example.com/plugins/metrics.tar.gz"

[[nodemanage.install_plugins]]
name = "shell"
version = "1.0.0"
package_url = "https://example.com/plugins/shell.tar.gz"

# 可选：NodeManage 独立 MySQL 配置。
# 如果不配置，当前实现使用内存仓储；后续接入持久化时会复用该配置。
[nodemanage.mysql]
host = "127.0.0.1"
port = 3306
user = "root"
password = "your_mysql_password_here"
database = "rsde"
max_connections = 10
min_connections = 1
connect_timeout_secs = 10
