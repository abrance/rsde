# 自定义配置示例
# 复制此文件并根据您的环境进行修改

# 基本配置
namespace: xy
replicaCount: 1

# 镜像配置
image:
  repository: ghcr.io/abrance/rsde/xy
  tag: "latest"
  pullPolicy: IfNotPresent

# 如果使用私有镜像仓库
# imagePullSecrets:
#   - name: regcred

# Service 配置
# 选项: ClusterIP, NodePort, LoadBalancer
service:
  type: ClusterIP
  port: 3000
  targetPort: 3000
  # 如果使用 NodePort
  # nodePort: 30000
  annotations: {}


# 资源配置 - 根据实际负载调整
resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 1000m
    memory: 1Gi

# 健康检查配置
livenessProbe:
  httpGet:
    path: /api/anybox/health
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/anybox/health
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# 持久化存储 - 图片上传需要
persistence:
  enabled: true
  storageClass: "your-storage-class"  # 例如: nfs-client, local-path
  size: 20Gi
  accessMode: ReadWriteOnce
  mountPath: /app/uploads

# 应用配置
config:
  apiserver:
    listen_address: "0.0.0.0:3000"
    log_level: "info"  # debug, info, warn, error
    cors_enabled: true

  # Anybox Redis 配置 - 请修改为您的 Redis 地址
  anybox:
    redis_url: "redis://:your-redis-password@redis-host.namespace.svc.cluster.local:6379/0"
    key_prefix: "anybox"
    cleanup_interval_secs: 3600

  # 七牛云对象存储配置 - 如果不需要对象存储功能，可以删除整个 object_storage 配置块
  # 注意：access_key 和 secret_key 是敏感信息，生产环境建议通过安全 values 文件或 --set 注入
  object_storage:
    access_key: "your-qiniu-access-key"
    secret_key: "your-qiniu-secret-key"
    bucket: "your-bucket-name"
    region: "z0"  # 可选: z0, z1, z2, na0, as0
    domain: "your-bucket-domain.example.com"
    public_base_url: "https://your-bucket-domain.example.com"
    upload_token_ttl_secs: 3600
    private_url_ttl_secs: 3600
    use_https: true
    path_prefix: ""
    bucket_is_private: false

  # OCR 配置 - 如果不需要 OCR 功能，可以删除整个 remote_ocr 配置块
  # 注意：这里需要替换为您实际的 OCR 服务地址和认证信息
  remote_ocr:
    perm_url: "https://your-ocr-service.com/api/perm/single"
    start_url: "https://your-ocr-service.com/api/ocr/image/beta"
    status_url: "https://your-ocr-service.com/api/ocr/image/beta/status"
    auth_token: "your-auth-token-here"
    auth_uuid: "your-auth-uuid-here"
    auth_cookie: "your-auth-cookie-here"
    origin: "https://your-ocr-service.com"
    mode: "single"
    timeout_secs: 60
    poll_interval_ms: 3000
    poll_max_attempts: 20
    poll_initial_delay_ms: 500
    accept_invalid_certs: false

  # 图床配置
  image_hosting:
    storage_dir: "/app/uploads"
    cleanup_interval_secs: 7200  # 2小时
    file_expire_secs: 7200       # 2小时

  # DataLink Engine 配置
  # 当前可用 backend: memory
  # mysql 配置面已预留，但后端实现暂未完成，选择 mysql 时会返回未支持错误。
  datalink_engine:
    backend: "memory"
    # mysql:
    #   host: "mysql.namespace.svc.cluster.local"
    #   port: 3306
    #   user: "root"
    #   password: "your-password"
    #   database: "rsde"
    #   max_connections: 10
    #   min_connections: 1
    #   connect_timeout_secs: 10

# 环境变量
env:
  - name: RUST_LOG
    value: "info"
  - name: TZ
    value: "Asia/Shanghai"

# 节点选择器 - 如果需要调度到特定节点
# nodeSelector:
#   disktype: ssd
#   zone: cn-north-1a

# 容忍度 - 允许调度到有特定污点的节点
# tolerations:
#   - key: "dedicated"
#     operator: "Equal"
#     value: "rsde"
#     effect: "NoSchedule"

# 亲和性 - 高级调度策略
# affinity:
#   nodeAffinity:
#     preferredDuringSchedulingIgnoredDuringExecution:
#       - weight: 100
#         preference:
#           matchExpressions:
#             - key: node-role
#               operator: In
#               values:
#                 - worker

# Pod 注解
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/metrics"
